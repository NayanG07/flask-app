#API Keys, Sensitive Data, and Secrets Detection Workflow using Gitleaks

name: Secret Scan

on:
    workflow_call:

jobs:
    secret-scan:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: action/checkout@v6
              with:
                fetch-depth: 0

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              
