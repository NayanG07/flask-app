name: python-lint

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: check code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r ${{github.workspace}}/requirements.txt

      - name: Run flake8
        run: flake8 ${{github.workspace}}/app.py